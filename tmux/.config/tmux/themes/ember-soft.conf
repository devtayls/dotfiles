# Ember Soft theme for tmux status bar (lifted dark variant)
# Source: https://github.com/ember-theme/ember/blob/main/palette.json
# Hand-built — no official tmux port exists.

# Ember Soft palette:
# bg       #242320 (lifted graphite — main status bg)
# bg_deep  #1c1b19 (deep graphite — used for inactive window segments for contrast)
# fg       #d8d0c0 (ivory)
# mauve    #988090 (faint violet — inactive window fg)
# coral    #e08060 (HERO — session indicator + active window)

# Status bar colors
set -g status-bg "#242320"
set -g status-fg "#d8d0c0"

# Status left (session name — coral hero)
set -g status-left "#[bg=#e08060,fg=#242320] 🔥 #S #[bg=#242320,fg=#e08060]"
set -g status-left-length 100

# Window status (current — coral hero)
set -g window-status-current-format "#[fg=#242320,bg=#e08060]#[fg=#242320,bg=#e08060] #{?window_zoomed_flag,  ,}#W #[bg=#242320,fg=#e08060]"

# Window status (inactive — muted mauve on deep graphite for contrast against lifted bg)
set -g window-status-format "#[fg=#242320,bg=#1c1b19]#[fg=#988090,bg=#1c1b19] #{?window_zoomed_flag,  ,}#W #[bg=#242320,fg=#1c1b19]"

# Status right (time and date)
set -g status-right "#[bg=#242320,fg=#1c1b19]#[fg=#d8d0c0, bg=#1c1b19] %H:%M #[fg=#e08060,bg=#1c1b19]#[bg=#e08060,fg=#242320] %Y-%m-%d "

# Window status separator
set -g window-status-separator ""
