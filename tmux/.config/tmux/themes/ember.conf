# Ember theme for tmux status bar (dark variant)
# Source: https://github.com/ember-theme/ember/blob/main/palette.json
# Hand-built — no official tmux port exists.

# Ember palette:
# bg       #1c1b19 (graphite)
# bg_alt   #242320 (lifted graphite, used for inactive window segments)
# fg       #d8d0c0 (ivory)
# mauve    #988090 (faint violet — inactive window fg)
# coral    #e08060 (HERO — session indicator + active window)

# Status bar colors
set -g status-bg "#1c1b19"
set -g status-fg "#d8d0c0"

# Status left (session name — coral hero)
set -g status-left "#[bg=#e08060,fg=#1c1b19] 🔥 #S #[bg=#1c1b19,fg=#e08060]"
set -g status-left-length 100

# Window status (current — coral hero)
set -g window-status-current-format "#[fg=#1c1b19,bg=#e08060]#[fg=#1c1b19,bg=#e08060] #{?window_zoomed_flag,  ,}#W #[bg=#1c1b19,fg=#e08060]"

# Window status (inactive — muted mauve on lifted graphite)
set -g window-status-format "#[fg=#1c1b19,bg=#242320]#[fg=#988090,bg=#242320] #{?window_zoomed_flag,  ,}#W #[bg=#1c1b19,fg=#242320]"

# Status right (time and date)
set -g status-right "#[bg=#1c1b19,fg=#242320]#[fg=#d8d0c0, bg=#242320] %H:%M #[fg=#e08060,bg=#242320]#[bg=#e08060,fg=#1c1b19] %Y-%m-%d "

# Window status separator
set -g window-status-separator ""
