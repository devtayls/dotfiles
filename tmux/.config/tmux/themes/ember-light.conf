# Ember Light theme for tmux status bar (warm ivory variant)
# Source: https://github.com/ember-theme/ember/blob/main/palette.json
# Hand-built — no official tmux port exists.
# Uses accents_light (darker accents) per palette.json for WCAG AA on light bg.

# Ember Light palette:
# bg       #e6dac4 (warm parchment)
# bg_alt   #c8bca6 (lifted parchment — inactive window segments)
# fg       #282418 (dark text)
# mauve_l  #706070 (faint violet dark — inactive window fg)
# coral_l  #b84c30 (HERO — session indicator + active window, darkened for contrast)

# Status bar colors
set -g status-bg "#e6dac4"
set -g status-fg "#282418"

# Status left (session name — coral hero)
set -g status-left "#[bg=#b84c30,fg=#e6dac4] 🔥 #S #[bg=#e6dac4,fg=#b84c30]"
set -g status-left-length 100

# Window status (current — coral hero)
set -g window-status-current-format "#[fg=#e6dac4,bg=#b84c30]#[fg=#e6dac4,bg=#b84c30] #{?window_zoomed_flag,  ,}#W #[bg=#e6dac4,fg=#b84c30]"

# Window status (inactive — muted mauve on lifted parchment)
set -g window-status-format "#[fg=#e6dac4,bg=#c8bca6]#[fg=#706070,bg=#c8bca6] #{?window_zoomed_flag,  ,}#W #[bg=#e6dac4,fg=#c8bca6]"

# Status right (time and date)
set -g status-right "#[bg=#e6dac4,fg=#c8bca6]#[fg=#282418, bg=#c8bca6] %H:%M #[fg=#b84c30,bg=#c8bca6]#[bg=#b84c30,fg=#e6dac4] %Y-%m-%d "

# Window status separator
set -g window-status-separator ""
