# Reset theme-affected options to tmux defaults.
# Sourced by switch-theme.sh before any theme, so options set by one theme
# (e.g. window-status-current-style) don't persist when switching to a theme
# that doesn't explicitly set them.
#
# `set -gu` unsets the option, restoring tmux's real default.
# status-bg / status-fg are deliberately omitted — every theme overrides them,
# so resetting adds a visible default-colored flash during the switch.

set -gu status-left-style
set -gu status-right-style
set -gu window-status-style
set -gu window-status-current-style
set -gu window-status-activity-style
set -gu window-status-bell-style
set -gu window-status-last-style
set -gu message-style
set -gu message-command-style
set -gu mode-style
set -gu pane-border-style
set -gu pane-active-border-style
