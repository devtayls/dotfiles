# Everforest theme for tmux status bar
# Based on everforest color scheme (Hard variant)

# Everforest palette:
# bg0: #2b3339 (dark background)
# bg1: #323d43 (slightly lighter background)
# fg: #d3c6aa (main foreground)
# grey: #859289 (muted gray-green)
# green: #a7c080 (accent green)

# Status bar colors
set -g status-bg "#2b3339"
set -g status-fg "#d3c6aa"

# Status left (session name)
set -g status-left "#[bg=#a7c080,fg=#2b3339] 🐸 #S #[bg=#2b3339,fg=#a7c080]"
set -g status-left-length 100

# Window status (current)
set -g window-status-current-format "#[fg=#2b3339,bg=#a7c080]#[fg=#2b3339,bg=#a7c080] #{?window_zoomed_flag,  ,}#W #[bg=#2b3339,fg=#a7c080]"

# Window status (inactive)
set -g window-status-format "#[fg=#2b3339,bg=#323d43]#[fg=#859289,bg=#323d43] #{?window_zoomed_flag,  ,}#W #[bg=#2b3339,fg=#323d43]"

# Status right (time and date)
set -g status-right "#[bg=#2b3339,fg=#323d43]#[fg=#d3c6aa, bg=#323d43] %H:%M #[fg=#a7c080,bg=#323d43]#[bg=#a7c080,fg=#2b3339] %Y-%m-%d "

# Window status separator
set -g window-status-separator ""
