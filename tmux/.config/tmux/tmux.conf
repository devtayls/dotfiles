## Settings
# Enable Mouse mode
set -g mouse on 

# Use hex colors
set -as terminal-features ',xterm-kitty:RGB'

# spotify silliness
new -s spotify -n "󰓇 " spt

# Fuzzback
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '90%'

# Tmux-Thumbs
# show picker: B+F
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-hint-bg-color yellow
set -g @thumbs-hint-fg-color black
set -g @thumbs-contrast 1
set -g @thumbs-reverse enabled
set -g @thumbs-regexp-1 'portal-pr-.*'
set -g @thumbs-key 'F'

# Keybindings
# stevens suggestions
bind Escape copy-mode
# Paste from buffer
bind-key p paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi C-y send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key C-r choose-buffer

# Open terminal window
# bind > display-popup -e
bind > display-popup -E -w 50% -h 50%

## Github
bind g switch-client -Ttable1
# Show ci checks for current branch
bind -Ttable1 x split-window -h -l 100 \; send-keys 'gh pr checks' C-m
# Show github pr for current branch
bind -Ttable1 g split-window -h -l 100 'gh pr view --web'

# Workmux - parallel AI agent workflows with git worktrees
bind w switch-client -T workmux
bind -T workmux a run-shell "tmux-popup-workmux-add"
bind -T workmux d display-popup -E -w 90% -h 90% "mise x -- workmux dashboard"
bind -T workmux l display-popup -E -w 80% -h 80% "mise x -- tv workmux-worktrees"
bind -T workmux o display-popup -E -w 60% -h 60% "mise x -- tv workmux-open"
bind -T workmux s run-shell "tmux-workmux-focus-sidebar"

## Remap Session finder to rally
## prefix + s --> rally
## prefix + S --> switch between session
bind s display-popup -E -w 80% -h 70% rally
bind S display-popup -E 'tmux switch-client -t "$(tmux list-sessions -F "#{session_name}"| fzf)"'

## backspace jumps between sessions
bind BSpace switch-client -l

## ! kills server
bind ! kill-server

## Shift left/right moves in your windows
bind -n S-Left previous-window
bind -n S-Right next-window

## Window Keybindings
bind | split-window -h
bind - split-window -v
bind t command-prompt -p "Window name:" "new-window -n '%%'"

## some tomfoolery
bind = display-popup -w 80% -h 80% -E btop

## OpenCode AI assistant (toggle with prefix + o)
bind o run-shell "~/.config/tmux/toggle-opencode.sh"

# Renumber window panes
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Scroll back length
set -g history-limit 100000

# Timeout for escape keypress time
set -s escape-time 1

# Enable focus events for better Neovim integration
set -g focus-events on

# Clipboard
set set-clipboard on

# Vi mode for copy mode
set -g mode-keys vi

## Plugins
set -g @plugin 'christoomey/vim-tmux-navigator'

## Load plugins — must come after all `set -g @plugin '...'` declarations above
run '~/.config/tmux/plugins/tpm/tpm'

# Theme: sources whatever's in ~/.local/state/theme/current (shared with Neovim).
# Falls back to everforest if state file missing. Re-runs on every :source-file.
# _reset.conf unsets theme-affected options first so a config reload can't
# inherit stale -style values from the previous theme.
run-shell 'tmux source-file ~/dotfiles/tmux/.config/tmux/themes/_reset.conf; tmux source-file ~/dotfiles/tmux/.config/tmux/themes/$(cat ~/.local/state/theme/current 2>/dev/null || echo everforest).conf'
