# Global workmux defaults (inspired by dkarter)
# For project-specific settings, create .workmux.yaml in project root
nerdfont: true
merge_strategy: rebase
agent: 'claude -n "$WORKMUX_HANDLE"'

# Status icons for tmux window names
status_icons:
  working: ""
  waiting: "󱜸"
  done: ""

# Post-create hooks
post_create:
  - '[ -f mise.toml ] && mise trust && mise install || true'
  # APFS clonefile (cp -c): copy-on-write, instant, ~0 disk until divergence.
  - 'cp -cR "$WM_PROJECT_ROOT/_build"              _build              2>/dev/null || true'
  - 'cp -cR "$WM_PROJECT_ROOT/deps"                deps                2>/dev/null || true'
  - 'cp -cR "$WM_PROJECT_ROOT/assets/node_modules" assets/node_modules 2>/dev/null || true'

# Pre-merge hooks (run tests before allowing merge)
pre_merge:
  - "[ -f mix.exs ] && mix test || true"

# Dashboard settings
dashboard:
  commit: "Commit staged changes with a descriptive message using conventional commits"
theme: emberforge
